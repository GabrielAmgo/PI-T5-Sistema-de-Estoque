# Nome da aplica\u00e7\u00e3o
spring.application.name=inventory-manager

# Configura\u00e7\u00e3o do H2 (Para testes r\u00e1pidos sem instalar nada)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console do H2 (Para voc\u00ea ver as tabelas no navegador em localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Estrat\u00e9gia de cria\u00e7\u00e3o do banco (update cria as tabelas se elas n\u00e3o existirem)
spring.jpa.hibernate.ddl-auto=update

# Mostrar o SQL no console (Bom para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true